moderation:
  reasons:
    warningReasons:
      - "Disrespect"
      - "Excessive Language"
      - "Spam"
      - "Toxic Behavior"
    muteReasons:
      - "Chat Spam"
      - "Harassment"
      - "Excessive Language"
      - "Argumentative Behavior"
    banReasons:
      - "Cheating"
      - "Bug Abuse"
      - "X-Ray/Exploit Use"
      - "Severe Harassment"

  messages:
